<html lang="en">

<div id="root"></div>

<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { Card, Badge, Button } = window.ColaberryDesignSystem_098454;
  function Demo() {
    return (
      <div className="grid">
        <Card hoverable media={<div className="ph" style={{background:'linear-gradient(135deg,var(--blue-500),var(--blue-700))'}}>Analytics</div>}>

          <Button size="sm" tone="green">Explore</Button>
        </Card>
        <Card padded accent="red" elevation="md">

          <h3>Veterans grant</h3>
          <p>Full-tuition support for those who served.</p>
          <Button size="sm">Apply</Button>

  ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
