<!-- @dsCard group="Components" viewport="700x320" name="Data & overlays" subtitle="Table · Textarea · Dialog · Drawer · Carousel" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 26px; background: var(--surface-page); }
  .grid { display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 26px; align-items: start; }
  .lbl { font-family: var(--font-mono); font-size: 11px; color: var(--text-subtle); margin-bottom: 12px; text-transform: uppercase; letter-spacing: .05em; }
  .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { Table, Textarea, Dialog, Drawer, Carousel, Button, Badge } = window.ColaberryDesignSystem_098454;
  function Demo() {
    const [dlg, setDlg] = React.useState(false);
    const [drw, setDrw] = React.useState(false);
    const slide = (label, a, b) => <div style={{ height: 120, display: 'grid', placeItems: 'center', color: '#fff', fontFamily: 'var(--font-display)', fontWeight: 700, fontSize: 22, background: `linear-gradient(135deg, var(--${a}), var(--${b}))` }}>{label}</div>;
    return (
      <div className="grid">
        <div>
          <div className="lbl">Table</div>
          <Table columns={[
            { key: 'name', header: 'Cohort' },
            { key: 'wk', header: 'Weeks', align: 'right' },
            { key: 'st', header: 'Status', render: (v) => <Badge tone={v === 'Open' ? 'green' : 'neutral'} dot={v === 'Open'}>{v}</Badge> },
          ]} data={[
            { name: 'Data Analytics', wk: 12, st: 'Open' },
            { name: 'Data Science', wk: 24, st: 'Open' },
            { name: 'Intro Seminar', wk: 2, st: 'Closed' },
          ]} />
          <div className="lbl" style={{ marginTop: 22 }}>Overlays</div>
          <div className="row">
            <Button size="sm" onClick={() => setDlg(true)}>Open dialog</Button>
            <Button size="sm" variant="outline" onClick={() => setDrw(true)}>Open drawer</Button>
          </div>
          <Dialog open={dlg} title="Confirm enrollment" onClose={() => setDlg(false)}
            footer={<><Button variant="ghost" size="sm" onClick={() => setDlg(false)}>Cancel</Button><Button size="sm" onClick={() => setDlg(false)}>Confirm</Button></>}>
            Ready to start the Data Analytics program? You can change your cohort later.
          </Dialog>
          <Drawer open={drw} title="Filters" onClose={() => setDrw(false)}>Pick a program, format, and start date.</Drawer>
        </div>
        <div>
          <div className="lbl">Textarea</div>
          <Textarea label="Why data?" placeholder="A sentence or two…" maxLength={120} />
          <div className="lbl" style={{ marginTop: 22 }}>Carousel</div>
          <Carousel slides={[slide('Mentorship', 'blue-500', 'blue-700'), slide('Projects', 'green-500', 'green-700'), slide('Get hired', 'red-400', 'red-600')]} />
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
