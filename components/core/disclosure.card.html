<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 26px; background: var(--surface-page); }
  .stack { display: flex; flex-direction: column; gap: 22px; }
  .lbl { font-family: var(--font-mono); font-size: 11px; color: var(--text-subtle); margin-bottom: 10px; text-transform: uppercase; letter-spacing: .05em; }
  .row { display: flex; gap: 14px; align-items: center; flex-wrap: wrap; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { Accordion, Breadcrumb, Pagination, Tooltip, Popover, Button } = window.ColaberryDesignSystem_098454;
  function Demo() {
    const [page, setPage] = React.useState(3);
    return (
      <div className="stack">
        <div>
          <div className="lbl">Accordion</div>
          <Accordion defaultOpen={[0]} items={[
            { title: 'What is included?', content: 'Live instructor-led classes, 1:1 mentorship, a portfolio project, and one year of job support.' },
            { title: 'Do I need a degree?', content: 'No — a high-school diploma or GED is all you need. There are no admissions tests.' },
          ]} />
        </div>
        <div>
          <div className="lbl">Breadcrumb</div>
          <Breadcrumb items={[{ label: 'Home' }, { label: 'Programs' }, { label: 'Data Analytics' }]} />
        </div>
        <div>
          <div className="lbl">Pagination</div>
          <Pagination page={page} total={9} onChange={setPage} />
        </div>
        <div>
          <div className="lbl">Tooltip &amp; Popover</div>
          <div className="row">
            <Tooltip label="Closes the menu"><Button size="sm" variant="outline">Hover me</Button></Tooltip>
            <Popover placement="bottom" trigger={<Button size="sm">Open popover</Button>}>
              <strong>Need help?</strong>
              <div style={{ marginTop: 6, color: 'var(--text-muted)', fontSize: 13 }}>Talk to an advisor — no pressure.</div>
            </Popover>
          </div>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
