<!-- @dsCard group="Spacing" viewport="700x180" name="Spacing scale" subtitle="4px base grid — 4 to 96" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 24px 28px; background: var(--surface-page); }
  .row { display: flex; align-items: flex-end; gap: 14px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .bar { background: var(--blue-500); width: 100%; border-radius: var(--radius-xs); }
  .box { display:flex; flex-direction:column; align-items:center; }
  .v { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); }
  .t { font-family: var(--font-body); font-size: 11px; color: var(--text-subtle); }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="bar" style="height:4px;width:4px"></div><div class="v">4</div><div class="t">1</div></div>
    <div class="item"><div class="bar" style="height:8px;width:8px"></div><div class="v">8</div><div class="t">2</div></div>
    <div class="item"><div class="bar" style="height:12px;width:12px"></div><div class="v">12</div><div class="t">3</div></div>
    <div class="item"><div class="bar" style="height:16px;width:16px"></div><div class="v">16</div><div class="t">4</div></div>
    <div class="item"><div class="bar" style="height:24px;width:24px"></div><div class="v">24</div><div class="t">6</div></div>
    <div class="item"><div class="bar" style="height:32px;width:32px"></div><div class="v">32</div><div class="t">8</div></div>
    <div class="item"><div class="bar" style="height:48px;width:48px"></div><div class="v">48</div><div class="t">12</div></div>
    <div class="item"><div class="bar" style="height:64px;width:64px"></div><div class="v">64</div><div class="t">16</div></div>
    <div class="item"><div class="bar" style="height:80px;width:80px"></div><div class="v">80</div><div class="t">20</div></div>
    <div class="item"><div class="bar" style="height:96px;width:96px"></div><div class="v">96</div><div class="t">24</div></div>
  </div>
</body>
</html>
