<!-- @dsCard group="Colors" viewport="700x180" name="Data-viz · categorical" subtitle="8-series chart palette — max separation, color-blind safe" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 24px 26px; background: var(--surface-page); font-family: var(--font-body); }
  .bars { display: flex; align-items: flex-end; gap: 10px; height: 78px; margin-bottom: 14px; }
  .bar { flex: 1; border-radius: var(--radius-sm) var(--radius-sm) 0 0; }
  .legend { display: flex; flex-wrap: wrap; gap: 8px 16px; }
  .key { display: flex; align-items: center; gap: 7px; font-size: 12px; color: var(--text-muted); }
  .dot { width: 12px; height: 12px; border-radius: 3px; }
</style>
</head>
<body>
  <div class="bars">
    <div class="bar" style="height:64%;background:var(--chart-1)"></div>
    <div class="bar" style="height:92%;background:var(--chart-2)"></div>
    <div class="bar" style="height:48%;background:var(--chart-3)"></div>
    <div class="bar" style="height:76%;background:var(--chart-4)"></div>
    <div class="bar" style="height:58%;background:var(--chart-5)"></div>
    <div class="bar" style="height:84%;background:var(--chart-6)"></div>
    <div class="bar" style="height:40%;background:var(--chart-7)"></div>
    <div class="bar" style="height:70%;background:var(--chart-8)"></div>
  </div>
  <div class="legend">
    <span class="key"><span class="dot" style="background:var(--chart-1)"></span>chart-1</span>
    <span class="key"><span class="dot" style="background:var(--chart-2)"></span>chart-2</span>
    <span class="key"><span class="dot" style="background:var(--chart-3)"></span>chart-3</span>
    <span class="key"><span class="dot" style="background:var(--chart-4)"></span>chart-4</span>
    <span class="key"><span class="dot" style="background:var(--chart-5)"></span>chart-5</span>
    <span class="key"><span class="dot" style="background:var(--chart-6)"></span>chart-6</span>
    <span class="key"><span class="dot" style="background:var(--chart-7)"></span>chart-7</span>
    <span class="key"><span class="dot" style="background:var(--chart-8)"></span>chart-8</span>
  </div>
</body>
</html>
