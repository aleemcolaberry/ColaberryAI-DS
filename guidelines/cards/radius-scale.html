<!-- @dsCard group="Spacing" viewport="700x160" name="Radius scale" subtitle="Rounded & friendly — 4 to 32 + pill" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 24px 28px; background: var(--surface-page); }
  .row { display: flex; gap: 18px; align-items: flex-start; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .box { width: 84px; height: 70px; background: var(--green-100); border: 2px solid var(--green-500); }
  .v { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); }
  .t { font-family: var(--font-body); font-size: 12px; color: var(--text-strong); font-weight: var(--fw-medium); }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="border-radius:var(--radius-xs)"></div><div class="t">xs</div><div class="v">4</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-sm)"></div><div class="t">sm</div><div class="v">8</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-md)"></div><div class="t">md</div><div class="v">12</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-lg)"></div><div class="t">lg</div><div class="v">16</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-xl)"></div><div class="t">xl</div><div class="v">24</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-2xl)"></div><div class="t">2xl</div><div class="v">32</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-pill)"></div><div class="t">pill</div><div class="v">999</div></div>
  </div>
</body>
</html>
