<!-- @dsCard group="Colors" viewport="700x140" name="Green ramp" subtitle="Functional success only — 50 to 900" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 22px 24px; background: var(--surface-page); }
  .ramp { display: grid; grid-template-columns: repeat(10, 1fr); border-radius: var(--radius-md); overflow: hidden; border: 1px solid var(--border-subtle); }
  .step { height: 84px; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 8px; font-family: var(--font-mono); font-size: 11px; }
</style>
</head>
<body>
  <div class="ramp">
    <div class="step" style="background:var(--green-50)">50</div>
    <div class="step" style="background:var(--green-100)">100</div>
    <div class="step" style="background:var(--green-200)">200</div>
    <div class="step" style="background:var(--green-300)">300</div>
    <div class="step" style="background:var(--green-400)">400</div>
    <div class="step" style="background:var(--green-500)">500</div>
    <div class="step" style="background:var(--green-600); color:#fff">600</div>
    <div class="step" style="background:var(--green-700); color:#fff">700</div>
    <div class="step" style="background:var(--green-800); color:#fff">800</div>
    <div class="step" style="background:var(--green-900); color:#fff">900</div>
  </div>
</body>
</html>
