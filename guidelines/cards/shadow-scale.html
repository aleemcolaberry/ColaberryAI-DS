<!-- @dsCard group="Spacing" viewport="700x180" name="Elevation / shadow" subtitle="Soft, low-spread shadows + cherry-tinted lift" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 30px 28px; background: var(--surface-page); }
  .row { display: flex; gap: 26px; align-items: center; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .box { width: 92px; height: 70px; background: var(--surface-card); border-radius: var(--radius-lg); }
  .t { font-family: var(--font-body); font-size: 12px; color: var(--text-strong); font-weight: var(--fw-medium); }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="box-shadow:var(--shadow-sm)"></div><div class="t">sm</div></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-md)"></div><div class="t">md</div></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-lg)"></div><div class="t">lg</div></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-xl)"></div><div class="t">xl</div></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-brand)"></div><div class="t">brand</div></div>
  </div>
</body>
</html>
