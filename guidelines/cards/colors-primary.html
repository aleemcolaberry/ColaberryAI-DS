<!-- @dsCard group="Colors" viewport="700x190" name="Primary palette" subtitle="Teal, Cyan, Black + White — the core brand colors" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 22px 24px; background: var(--surface-page); }
  .row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
  .sw { border-radius: var(--radius-lg); overflow: hidden; border: 1px solid var(--border-subtle); }
  .chip { height: 96px; }
  .meta { padding: 10px 12px; }
  .name { font-family: var(--font-body); font-weight: var(--fw-bold); font-size: 14px; color: var(--text-strong); }
  .hex { font-family: var(--font-mono); font-size: 12px; color: var(--text-muted); margin-top: 2px; text-transform: uppercase; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--blue-500)"></div><div class="meta"><div class="name">Teal</div><div class="hex">#357895</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--cyan-500)"></div><div class="meta"><div class="name">Cyan</div><div class="hex">#00C4CC</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--neutral-1000)"></div><div class="meta"><div class="name">Black</div><div class="hex">#000000</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--neutral-0); border-bottom:1px solid var(--border-subtle)"></div><div class="meta"><div class="name">White</div><div class="hex">#FFFFFF</div></div></div>
  </div>
</body>
</html>
