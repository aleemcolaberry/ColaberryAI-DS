<!-- @dsCard group="Colors" viewport="700x150" name="Status colors" subtitle="Success, danger, info, warning — functional UI states" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 22px 24px; background: var(--surface-page); }
  .row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .item { border: 1px solid var(--border-subtle); border-radius: var(--radius-md); overflow: hidden; }
  .bar { height: 56px; }
  .body { padding: 8px 12px; }
  .pill { display:inline-block; font-family: var(--font-body); font-weight: var(--fw-medium); font-size: 12px; padding: 3px 10px; border-radius: var(--radius-pill); }
  .nm { font-family: var(--font-body); font-weight: var(--fw-bold); font-size: 13px; color: var(--text-strong); margin-bottom: 6px; }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="bar" style="background:var(--status-success)"></div><div class="body"><div class="nm">Success</div><span class="pill" style="background:var(--status-success-bg);color:var(--status-success)">Enrolled</span></div></div>
    <div class="item"><div class="bar" style="background:var(--status-danger)"></div><div class="body"><div class="nm">Danger</div><span class="pill" style="background:var(--status-danger-bg);color:var(--status-danger)">Overdue</span></div></div>
    <div class="item"><div class="bar" style="background:var(--status-info)"></div><div class="body"><div class="nm">Info</div><span class="pill" style="background:var(--status-info-bg);color:var(--status-info)">New cohort</span></div></div>
    <div class="item"><div class="bar" style="background:var(--status-warning)"></div><div class="body"><div class="nm">Warning</div><span class="pill" style="background:var(--status-warning-bg);color:var(--status-warning)">Due soon</span></div></div>
  </div>
</body>
</html>
